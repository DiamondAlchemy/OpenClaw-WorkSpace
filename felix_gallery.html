<!DOCTYPE html>
<html>
<head>
    <title>Felix Avatar Gallery</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
        h1 { text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: #16213e; padding: 15px; border-radius: 10px; text-align: center; }
        img { width: 300px; border-radius: 8px; }
        h3 { margin: 10px 0 5px; }
    </style>
</head>
<body>
    <h1>Felix Avatar Gallery 🐦‍⬛</h1>
    <div class="gallery">
        <div class="card"><img src="felix_avatar.png"><h3>Classic</h3></div>
        <div class="card"><img src="felix_avatar_aquatic.png"><h3>Aquatic</h3></div>
        <div class="card"><img src="felix_armored_avatar.png"><h3>Armored</h3></div>
        <div class="card"><img src="robotic_lobster_avatar.png"><h3>Team Mate - Lobster</h3></div>
    </div>
</body>
</html>
